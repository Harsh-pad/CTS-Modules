<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Base Template</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        header, nav, main, footer {
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        nav {
            background-color: #e0e7ef;
            border-radius: 8px;
            margin-top: 20px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        main {
            background-color: #ffffff;
            margin-top: 20px;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        footer {
            background-color: #dbe2ea;
            text-align: center;
            font-size: 0.9rem;
            color: #555;
            border-radius: 8px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <!-- Navigation Section -->
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Content Section -->
    <main>
        <h1>Welcome to Our Portal</h1>
        <p>This is the base template for our website. All pages will maintain this semantic structure and styling. You can build upon this layout and customize each section as needed.</p>
    </main>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2025 Your Company Name. All rights reserved.</p>
    </footer>
</body>
</html>
